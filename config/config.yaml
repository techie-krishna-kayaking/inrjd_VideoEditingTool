# =========================================================
# ISKCON NRJD Media Engine Master Configuration
# =========================================================
# This file is the single source of truth for application behavior.
# Adjust values here to customize runtime behavior without changing Python code.

project:
  # Human-readable project name used in reports and CLI output.
  name: "ISKCON NRJD Media Engine"
  # Semantic version of this configuration profile.
  version: "0.1.0"
  # Primary maintainer for operational ownership.
  author: "ISKCON NRJD Media Team"
  # Organization or department owning the system.
  organization: "ISKCON NRJD"

paths:
  # Raw event drop zone used by operators.
  raw_data: "raw_data"
  # Organized input root generated by organizer workflows.
  input: "input"
  # Output root for rendered media and derivatives.
  output: "output"
  # Shared assets root (overlays, fonts, icons, logos).
  assets: "assets"
  # Music library folder used for background tracks.
  music: "assets/music"
  # Reports folder for JSON/CSV/summary outputs.
  reports: "output/reports"
  # Runtime log folder.
  logs: "output/logs"
  # Temporary working folder for intermediate files.
  temp: "output/temp"

render:
  # Maximum parallel workers. Product policy allows up to 2.
  workers: 2
  # Auto-detect GPU acceleration when available.
  gpu_auto_detect: true
  # Overwrite existing output files.
  overwrite_existing: false
  # Resume previously failed jobs.
  resume_failed: true
  # Generate report artifacts.
  create_reports: true
  # Persist runtime logs.
  create_logs: true
  # Generate thumbnail images.
  create_thumbnail: true
  # Preferred encoder: auto, cpu, nvidia, videotoolbox, quicksync, amd.
  preferred_encoder: "auto"
  # FFmpeg executable path or command name.
  ffmpeg_path: "ffmpeg"

shorts:
  # Enable short-form output profile.
  enabled: true
  resolution:
    # Portrait width for shorts.
    width: 1080
    # Portrait height for shorts.
    height: 1920
  # Target frame rate.
  fps: 60
  duration:
    # Minimum allowed duration.
    minimum: 30
    # Default render duration.
    default: 60
    # Maximum allowed duration.
    maximum: 90

long:
  # Enable long-form output profile.
  enabled: true
  resolution:
    # Landscape width for long-form videos.
    width: 1920
    # Landscape height for long-form videos.
    height: 1080
  # Target frame rate.
  fps: 60
  duration:
    # Minimum allowed duration.
    minimum: 240
    # Default render duration.
    default: 360
    # Maximum allowed duration.
    maximum: 540

images:
  # Shuffle image order before sequencing.
  random_order: true
  # Per-image display duration in seconds.
  image_duration: 1.5
  # Allow reuse of images when media count is limited.
  reuse_images: true
  # Number of recent items excluded from immediate repeats.
  avoid_recent_repeat: 10
  # Enable Ken Burns-style motion animation.
  enable_ken_burns: true
  # Randomize animation direction and speed.
  animation_random: true

videos:
  clip_duration:
    # Minimum segment length in seconds.
    minimum: 3
    # Maximum segment length in seconds.
    maximum: 5
  # Shuffle video clips.
  shuffle: true
  # Mute source clip audio during composition.
  mute_original_audio: true

transitions:
  # Enable hard cut transitions.
  hard_cut: true
  # Enable cross dissolve transitions.
  cross_dissolve: true
  # Enable film burn transitions.
  film_burn: true
  # Enable morph cut transitions.
  morph_cut: true
  # Enable match cut transitions.
  match_cut: true
  # Randomly select among enabled transitions.
  random_selection: true
  # Transition duration in seconds.
  duration: 0.6

color_grading:
  # Conservative global brightness adjustment.
  brightness: 0.03
  # Conservative global contrast multiplier.
  contrast: 1.05
  # Conservative global saturation multiplier.
  saturation: 1.05
  # Conservative sharpen strength.
  sharpen: 0.2
  # Gamma correction factor.
  gamma: 1.0

audio:
  # Randomly pick tracks from music folder.
  random_music: true
  # Random start offset for selected tracks.
  random_start_position: true
  # Fade-in duration in seconds.
  fade_in: 2.0
  # Fade-out duration in seconds.
  fade_out: 2.0
  # Normalize loudness to reduce volume jumps.
  normalize_loudness: true
  # Background music volume (0.0 to 1.0).
  music_volume: 0.24
  # Audio crossfade duration in seconds.
  crossfade: 1.5

text_overlay:
  # Opening title text.
  opening_title: "Hare Krishna"
  # Title animation preset.
  animation: "fade"
  # Title tilt in degrees.
  tilt: 2.0
  # Enable glass effect for title card.
  glass_effect: true
  # Title display duration in seconds.
  duration: 4.0
  # Font path relative to project root.
  font: "assets/fonts/default.ttf"
  # Enable text shadow.
  shadow: true
  # Enable text outline.
  outline: true

overlays:
  header:
    # Enable header overlay.
    enabled: true
    # Header overlay file path.
    file: "assets/overlays/shorts_header.png"
    # Overlay opacity (0.0 to 1.0).
    opacity: 0.95
    # Margin controls in pixels.
    margin_top: 16
    margin_bottom: 0
    margin_left: 16
    margin_right: 16
  footer:
    enabled: true
    file: "assets/overlays/shorts_footer.png"
    opacity: 0.95
    margin_top: 0
    margin_bottom: 16
    margin_left: 16
    margin_right: 16
  socials:
    enabled: true
    file: "assets/overlays/socials.png"
    opacity: 0.95
    margin_top: 0
    margin_bottom: 16
    margin_left: 16
    margin_right: 16
  website:
    enabled: true
    file: "assets/overlays/website.png"
    opacity: 0.95
    margin_top: 0
    margin_bottom: 16
    margin_left: 16
    margin_right: 16

thumbnails:
  # Enable thumbnail generation.
  generate: true
  # Thumbnail width in pixels.
  width: 1280
  # Thumbnail height in pixels.
  height: 720
  # JPEG quality from 1 to 100.
  jpeg_quality: 92

media_analyzer:
  minimum_resolution:
    # Minimum accepted media width.
    width: 720
    # Minimum accepted media height.
    height: 720
  # Skip corrupted files instead of stopping pipeline.
  ignore_corrupted_files: true
  # Ignore hidden files and folders.
  ignore_hidden_files: true
  # Supported media file extensions.
  supported_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".webp"
    - ".mp4"
    - ".mov"
    - ".m4v"
    - ".mkv"

organizer:
  # Auto-create short-form picture bucket.
  shortform_pictures: true
  # Auto-create short-form video bucket.
  shortform_videos: true
  # Auto-create long-form picture bucket.
  longform_pictures: true
  # Auto-create long-form video bucket.
  longform_videos: true
  # Auto-create rejected media bucket.
  rejected: true
  # File placement strategy: copy, move, or link.
  copy_strategy: "copy"
  # Analyzer report path (absolute or project-relative).
  analyzer_report: "output/reports/analyzer_report.json"

review:
  # Open media in OS default viewer for manual review.
  open_with_default_viewer: true
  # Reviewer identity for review reports (blank uses current OS user).
  reviewer: ""
  # Quality score threshold for low-quality filter.
  low_quality_threshold: 45
  # ETA model used in progress display.
  estimated_seconds_per_item: 20.0
  # Per-event review progress filename inside input/<event>/reports/.
  progress_file: "review_progress.json"
  # Per-event review report filename inside input/<event>/reports/.
  report_file: "review_report.json"

logging:
  # Enable console logging sink.
  console: true
  # Enable file logging sink.
  file: true
  # Log level: TRACE, DEBUG, INFO, SUCCESS, WARNING, ERROR, CRITICAL.
  level: "INFO"
  # File rotation policy.
  rotation: "1 day"
  # Log retention policy.
  retention: "14 days"

reports:
  # Write JSON reports.
  json: true
  # Write CSV reports.
  csv: true
  # Write summary reports.
  summary: true
  # Include aggregate statistics.
  statistics: true

advanced:
  # Enable experimental runtime pathways.
  experimental_features: false
  # Simulate execution without writing outputs.
  dry_run: false
  # Enable debug mode.
  debug_mode: false
  # Enable developer mode.
  developer_mode: false

environment:
  # Load values from .env if present.
  dotenv_enabled: true
  # Environment variable key for output folder override.
  output_folder_key: "NRJD_OUTPUT_FOLDER"
  # Environment variable key for FFmpeg path override.
  ffmpeg_path_key: "NRJD_FFMPEG_PATH"
  # Environment variable key for worker override.
  workers_key: "NRJD_WORKERS"
  # Environment variable key for debug mode override.
  debug_key: "NRJD_DEBUG"

video_render:
  # Global clip extraction defaults used by source-video workflows.
  clip_min: 3.0
  clip_max: 5.0
  # Video fit strategy (center_crop recommended for social exports).
  fit_mode: "center_crop"
  # Enable ffmpeg deshake filter for unstable handheld source clips.
  stabilization_enabled: false
  # Keep original source audio (false means music-only by default).
  keep_original_audio: false
  # Source-audio duck volume when music is mixed (0.0 to 1.0).
  duck_original_audio: 0.35
  # Enable random background music planning.
  music_enabled: true
  # Default grading preset for unified video workflows.
  color_preset: "natural"
  # Transition probability weights.
  transition_probabilities:
    hard_cut: 0.10
    cross_dissolve: 0.40
    film_burn: 0.10
    fade_through_black: 0.20
    zoom: 0.10
    slide: 0.05
    blur: 0.05
  # Built-in and custom color grading presets.
  color_presets:
    natural:
      brightness: 0.0
      contrast: 1.02
      saturation: 1.02
      sharpen: 0.18
      gamma: 1.0
    temple:
      brightness: 0.02
      contrast: 1.06
      saturation: 1.08
      sharpen: 0.20
      gamma: 1.0
    festival:
      brightness: 0.03
      contrast: 1.10
      saturation: 1.14
      sharpen: 0.24
      gamma: 0.99
    cinematic:
      brightness: -0.01
      contrast: 1.08
      saturation: 0.95
      sharpen: 0.16
      gamma: 1.02
    warm:
      brightness: 0.01
      contrast: 1.04
      saturation: 1.09
      sharpen: 0.18
      gamma: 0.99
    cool:
      brightness: -0.005
      contrast: 1.05
      saturation: 0.96
      sharpen: 0.18
      gamma: 1.01
  # Named profiles that can be selected via --profile.
  profiles:
    fast-preview:
      color_preset: "natural"
      transition_duration: 0.35
      short:
        target_duration: 35
      long:
        target_duration: 240
    cinematic-festival:
      color_preset: "festival"
      stabilization_enabled: true
      transition_probabilities:
        hard_cut: 0.05
        cross_dissolve: 0.45
        film_burn: 0.20
        fade_through_black: 0.10
        zoom: 0.10
        slide: 0.05
        blur: 0.05
      long:
        target_duration: 480
